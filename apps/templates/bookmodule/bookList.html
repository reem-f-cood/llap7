{% extends "layouts/base.html" %}

{% block title %} Results {% endblock title %}

{% block content %}
<h2>Search Results</h2>

{% if books %}
    <ul>
        {% for b in books %}
            <li>
                <strong>{{ b.title }}</strong> — {{ b.author }}
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No books found.</p>
{% endif %}

{% endblock content %}
