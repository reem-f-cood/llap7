<h1>Task 4 - Book Price Stats per Publisher</h1>

<table border="1">
    <tr>
        <th>Publisher</th>
        <th>Average Price</th>
        <th>Min Price</th>
        <th>Max Price</th>
    </tr>

    {% for p in publishers %}
    <tr>
        <td>{{ p.name }}</td>
        <td>{{ p.avg_price|floatformat:2 }}</td>
        <td>{{ p.min_price }}</td>
        <td>{{ p.max_price }}</td>
    </tr>
    {% endfor %}
</table>
