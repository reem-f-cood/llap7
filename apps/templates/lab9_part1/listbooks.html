<h2>Books List</h2>

<a href="/books/lab9_part1/addbook">Add New Book</a>

<table border="1" cellpadding="8">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Authors</th>
        <th>Price</th>
        <th>Actions</th>
    </tr>

    {% for b in books %}
    <tr>
        <td>{{ b.id }}</td>
        <td>{{ b.title }}</td>
        <td>{{ b.authors }}</td>
        <td>{{ b.price }}</td>
        <td>
            <a href="/books/lab9_part1/editbook/{{ b.id }}">Edit</a> |
            <a href="/books/lab9_part1/deletebook/{{ b.id }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
