<h1>Students</h1>

<a href="{% url 'add_student' %}">Add Student</a>

<hr>

{% for student in students %}

<p>
    {{ student.name }}
    -
    {{ student.age }}
    -
    {{ student.address }}

    <a href="{% url 'edit_student' student.id %}">
        Edit
    </a>

    <a href="{% url 'delete_student' student.id %}">
        Delete
    </a>
</p>

{% endfor %}
